name: Publish website

# Triggers the workflow only when pushing to the master branch
on:
  push:
    branches:
      - master

jobs:
  build:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v1

      - uses: c-hive/gha-npm-cache@v1

      - name: 🔨 Set up Node
        uses: actions/setup-node@v1
        with:
          node-version: 12.x
      - name: 🔧 Install tools
        run: |
          sudo apt install curl jq
          npm install
      - name: 🤵 Install Hugo
        run: |
          HUGO_VERSION=$(curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | jq -r '.tag_name')
          mkdir tmp/ && cd tmp/
          curl -sSL https://github.com/gohugoio/hugo/releases/download/${HUGO_VERSION}/hugo_extended_${HUGO_VERSION: -6}_Linux-64bit.tar.gz | tar -xvzf-
          sudo mv hugo /usr/local/bin/
          cd .. && rm -rf tmp/
          hugo version
      - name: 🧹 Clean site
        run: |
          if [ -d "public" ]; then
            rm -rf public/*
          fi
      - name: 🍳 Build site
        run: hugo
      - name: 🚀 Deploy build
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add .
          git commit -am "🚀 Deploy with ${GITHUB_WORKFLOW}"
          git push --all -f https://${{ secrets.STENCILA_BOT_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git
